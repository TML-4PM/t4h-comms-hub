<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>T4H Comms Hub</title>
<meta name="description" content="Tech 4 Humanity — public &amp; partner communications hub">
<style>
  :root {
    --bg:#0b0d10; --panel:#13171c; --border:#222a33; --muted:#7a8794; --text:#e7eef5;
    --accent:#5ee0c1; --warn:#f6c177; --danger:#ff7a7a; --link:#7cc4ff;
    --mono:'SF Mono','JetBrains Mono','Menlo',monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 var(--sans)}
  header{padding:28px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
  header h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:13px;margin-top:4px}
  header .meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;line-height:1.7}
  header .meta b{color:var(--accent);font-weight:600}
  main{max-width:1200px;margin:0 auto;padding:24px 32px}
  .filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .filters button{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:6px;cursor:pointer;font:inherit;font-size:13px}
  .filters button.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
  .filters input{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font:inherit;font-size:13px;flex:1;min-width:200px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s,transform .15s;display:flex;flex-direction:column;gap:8px}
  .card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .card .title{font-weight:600;color:var(--text);font-size:15px;line-height:1.35}
  .card .desc{color:var(--muted);font-size:12.5px;line-height:1.5;flex:1}
  .card .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
  .badge{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:3px;background:#1a2129;color:var(--muted);border:1px solid var(--border)}
  .badge.ext{color:var(--accent);border-color:rgba(94,224,193,.3)}
  .badge.partner{color:var(--warn);border-color:rgba(246,193,119,.3)}
  .badge.pending{color:var(--danger);border-color:rgba(255,122,122,.3)}
  .badge.src{color:var(--link);border-color:rgba(124,196,255,.3)}
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  /* Detail view */
  .detail{display:none}
  .detail.active{display:block}
  .listview.hidden{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--link);text-decoration:none;font-size:13px;margin-bottom:16px;cursor:pointer;background:none;border:none;font:inherit;padding:0}
  .back:hover{color:var(--accent)}
  .detail-title{font-size:24px;font-weight:600;margin:0 0 6px}
  .detail-meta{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:24px;display:flex;flex-wrap:wrap;gap:14px}
  .detail-meta a{color:var(--link)}
  .render-frame{background:#fff;color:#000;border:1px solid var(--border);border-radius:8px;padding:24px;overflow:auto;min-height:300px}
  .pending-banner{background:rgba(246,193,119,.1);border:1px solid var(--warn);color:var(--warn);padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:13px}
  footer{text-align:center;padding:32px;color:var(--muted);font-size:11px;font-family:var(--mono);border-top:1px solid var(--border);margin-top:48px}
  footer a{color:var(--link)}
  code{font-family:var(--mono);font-size:11.5px;background:#1a2129;padding:1px 5px;border-radius:3px;color:var(--accent)}
</style>
</head>
<body>

<header>
  <div>
    <h1>T4H Comms Hub</h1>
    <div class="sub">Tech 4 Humanity — public, partner &amp; external communications</div>
  </div>
  <div class="meta">
    Source: <b>public.comms_publication</b><br>
    Built: <span id="built">…</span><br>
    Pubs: <b><span id="count">0</span></b>
  </div>
</header>

<main>
  <div id="listview" class="listview">
    <div class="filters">
      <button data-aud="all" class="active">All</button>
      <button data-aud="external">External</button>
      <button data-aud="partner">Partner</button>
      <input type="search" id="search" placeholder="search title, tag, source…">
    </div>
    <div id="grid" class="grid"></div>
  </div>

  <div id="detail" class="detail">
    <button class="back" onclick="showList()">← back to hub</button>
    <h2 class="detail-title" id="d-title"></h2>
    <div class="detail-meta" id="d-meta"></div>
    <div id="d-pending"></div>
    <div class="render-frame" id="d-html"></div>
  </div>
</main>

<footer>
  T4H Comms Hub · static-baked from <code>public.comms_publication</code> ·
  Tech 4 Humanity Pty Ltd · ABN 70 666 271 272 · 
  <a href="mailto:hello@tech4humanity.com.au">hello@tech4humanity.com.au</a>
</footer>

<script>
let PUBS = [];
let currentFilter = 'all';

async function load() {
  const r = await fetch('/pubs.json');
  PUBS = await r.json();
  document.getElementById('count').textContent = PUBS.length;
  document.getElementById('built').textContent = new Date().toISOString().slice(0,16).replace('T',' ') + 'Z';
  render();
  // hash routing
  window.addEventListener('hashchange', route);
  route();
}
function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = PUBS.filter(p => {
    if (currentFilter !== 'all' && p.audience !== currentFilter) return false;
    if (!q) return true;
    return (p.title||'').toLowerCase().includes(q) ||
           (p.slug||'').toLowerCase().includes(q) ||
           JSON.stringify(p.tags||[]).toLowerCase().includes(q) ||
           (p.source_type||'').toLowerCase().includes(q);
  });
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No publications match.</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const pending = (p.html||'').includes('pending fetch');
    return `<div class="card" onclick="location.hash='#/p/${encodeURIComponent(p.slug)}'">
      <div class="title">${esc(p.title || p.slug)}</div>
      <div class="desc">${esc(p.description || (p.meta && p.meta.page_key ? 'Page: ' + p.meta.page_key : '— no description —'))}</div>
      <div class="badges">
        <span class="badge ${p.audience}">${p.audience}</span>
        <span class="badge src">${p.source_type}</span>
        ${pending ? '<span class="badge pending">pending fetch</span>' : ''}
        ${(p.tags||[]).slice(0,2).map(t => `<span class="badge">${esc(t)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function route() {
  const h = location.hash;
  if (h.startsWith('#/p/')) {
    const slug = decodeURIComponent(h.slice(4));
    const pub = PUBS.find(p => p.slug === slug);
    if (pub) { showDetail(pub); return; }
  }
  showList();
}
function showList() {
  document.getElementById('listview').classList.remove('hidden');
  document.getElementById('detail').classList.remove('active');
  if (location.hash) history.replaceState(null,'',location.pathname);
}
function showDetail(p) {
  document.getElementById('listview').classList.add('hidden');
  document.getElementById('detail').classList.add('active');
  document.getElementById('d-title').textContent = p.title || p.slug;
  const m = p.meta || {};
  const metaItems = [
    `<span><code>${p.slug}</code></span>`,
    `<span>audience: <b>${p.audience}</b></span>`,
    `<span>source: ${p.source_type}</span>`,
    `<span>${(p.byte_size||0).toLocaleString()} bytes</span>`,
    `<span>sha256: <code>${(p.html_sha256||'').slice(0,12)}…</code></span>`,
  ];
  if (m.web_view_link) metaItems.push(`<a href="${m.web_view_link}" target="_blank">drive ↗</a>`);
  if (m.page_key) metaItems.push(`<span>page_key: ${m.page_key}</span>`);
  document.getElementById('d-meta').innerHTML = metaItems.join('');
  const pending = (p.html||'').includes('pending fetch');
  document.getElementById('d-pending').innerHTML = pending
    ? `<div class="pending-banner">⚠ Body pending fetch from Google Drive. Run the comms-publisher Lambda to materialise this publication. Drive ID: <code>${m.gdrive_file_id||'?'}</code></div>`
    : '';
  // Render in iframe-style sandbox via shadow DOM-ish approach: use srcdoc-ish setup
  const frame = document.getElementById('d-html');
  if (pending) {
    frame.innerHTML = '<p style="color:#666;text-align:center;padding:60px 20px;">No body yet. Source not fetched.</p>';
  } else {
    // Sanitise minimal: strip script tags. (Trusted source = our own snippets, but defence-in-depth.)
    const safe = (p.html||'').replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '<!-- script stripped -->');
    frame.innerHTML = safe;
  }
  window.scrollTo(0,0);
}
function esc(s){return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

document.querySelectorAll('.filters button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.aud;
    render();
  });
});
document.getElementById('search').addEventListener('input', render);
load();
</script>
</body>
</html>
