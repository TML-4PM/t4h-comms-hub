<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>Synal · Live Companion</title>
<style>
  :root { --bg:#0a0a0c; --fg:#f4f4f5; --dim:#71717a; --accent:#22d3ee; --warn:#f59e0b; --good:#34d399; --llm:#a78bfa; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { background:var(--bg); color:var(--fg); font:14px/1.45 -apple-system,SF Pro Text,system-ui,sans-serif; min-height:100vh; }
  .shell { max-width:460px; margin:0 auto; padding:env(safe-area-inset-top, 18px) 16px env(safe-area-inset-bottom, 20px); }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .brand { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); }
  .listen { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--good); }
  .listen .dot { width:6px; height:6px; border-radius:50%; background:var(--good); animation:pulse 1.4s ease-in-out infinite; }
  .listen.err { color:#f87171; }
  .listen.err .dot { background:#f87171; animation:none; }
  @keyframes pulse { 50% { opacity:.35; transform:scale(.7); } }
  .now { background:linear-gradient(180deg,#18181b,#0f0f12); border:1px solid #27272a; border-radius:14px; padding:14px; margin-bottom:12px; }
  .now .what { font-size:12px; color:var(--dim); margin-bottom:4px; }
  .now .race { font-size:17px; font-weight:600; }
  .now .meta { display:flex; gap:14px; font-size:12px; color:var(--dim); margin-top:8px; font-variant-numeric:tabular-nums; flex-wrap:wrap; }
  .now .meta b { color:var(--fg); font-weight:600; }
  .beats { display:flex; flex-direction:column; gap:8px; }
  .beat { background:#0f0f12; border:1px solid #27272a; border-left:3px solid var(--accent); border-radius:10px; padding:12px; }
  .beat .trigger { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:4px; display:flex; gap:8px; align-items:center; }
  .beat .trigger .gen { color:var(--dim); letter-spacing:0; text-transform:none; font-size:9px; padding:1px 6px; border:1px solid #27272a; border-radius:3px; }
  .beat .trigger .gen.llm { color:var(--llm); border-color:var(--llm); }
  .beat .headline { font-size:15px; font-weight:600; margin-bottom:3px; }
  .beat .explainer { font-size:13px; color:#a1a1aa; }
  .beat.weather_rain { border-left-color:var(--warn); }
  .beat.weather_rain .trigger { color:var(--warn); }
  .beat.llm_insight, .beat.pit_window { border-left-color:var(--llm); }
  .beat.llm_insight .trigger, .beat.pit_window .trigger { color:var(--llm); }
  .empty { padding:30px 14px; color:var(--dim); text-align:center; font-size:13px; border:1px dashed #27272a; border-radius:10px; }
  .footer { margin-top:18px; padding-bottom:14px; font-size:10px; color:#52525b; text-align:center; letter-spacing:.05em; }
  .footer a { color:#52525b; text-decoration:none; }
  .controls { display:flex; gap:8px; margin-top:12px; }
  .btn { flex:1; background:#18181b; border:1px solid #27272a; color:var(--fg); padding:10px; border-radius:8px; font:600 12px/1 inherit; cursor:pointer; }
  @keyframes flash { 0%{background:#1c2027} 100%{background:#0f0f12} }
  .beat.new { animation: flash 1.2s ease-out; }
</style>
</head>
<body>
<main class="shell">
  <div class="topbar">
    <div class="brand">Synal · Live Companion</div>
    <div class="listen" id="listen"><span class="dot"></span><span id="listenLabel">Connecting…</span></div>
  </div>
  <section class="now" id="now">
    <div class="what">Detected on your TV</div>
    <div class="race" id="raceTitle">—</div>
    <div class="meta" id="raceMeta">Loading…</div>
  </section>
  <div class="beats" id="beats"><div class="empty">Waiting for first beat…</div></div>
  <div class="controls">
    <button class="btn" type="button" onclick="refresh()">Refresh</button>
    <button class="btn" type="button" onclick="toggleUser()">User: <span id="userLabel">troy</span></button>
  </div>
  <div class="footer">The race plays on the TV. The phone explains why the call was made.<br><a href="https://github.com/TML-4PM/mcp-command-centre/tree/main/synal/live-companion" target="_blank">SYNAL-002</a> · polling 8s</div>
</main>
<script>
const SUPABASE_URL='https://lzfgigiyqpuuxslsygjt.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6ZmdpZ2l5cXB1dXhzbHN5Z2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0MTc0NjksImV4cCI6MjA1OTk5MzQ2OX0.qUNzDEr2rxjRSClh5P4jeDv_18_yCCkFXTizJqNYSgg';
let currentUser='troy';let lastBeatSeq=-1;
async function fetchFeed(){try{const r=await fetch(`${SUPABASE_URL}/rest/v1/rpc/synal_phone_feed`,{method:'POST',headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`,'Content-Type':'application/json'},body:JSON.stringify({p_user_ref:currentUser})});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}catch(e){setListen('err','Offline');console.error(e);return null;}}
function setListen(s,l){const el=document.getElementById('listen');el.className='listen'+(s==='err'?' err':'');document.getElementById('listenLabel').textContent=l;}
function render(f){if(!f||!f.sessions||f.sessions.length===0){document.getElementById('raceTitle').textContent='No active session';document.getElementById('raceMeta').textContent='for user '+currentUser;document.getElementById('beats').innerHTML='<div class="empty">No active session</div>';setListen('ok','Idle');return;}const s=f.sessions[0];document.getElementById('raceTitle').textContent=s.content_title;document.getElementById('raceMeta').innerHTML=`<span>Persona <b>${s.persona_slug}</b></span><span>Beats <b>${s.beat_count}</b></span><span>Updated <b>${formatTime(s.last_beat_at)}</b></span>`;const bs=s.beats||[];const html=bs.map(b=>{const cls=(b.trigger_type||'').replace(/[^a-z_]/gi,'_');const llm=(b.generator==='llm_claude_sonnet_4')?'llm':'';const isNew=b.seq>lastBeatSeq;const tl=(b.trigger_type||'').replace(/_/g,' ');return `<article class="beat ${cls} ${isNew?'new':''}"><div class="trigger">${tl}${b.generator?` <span class="gen ${llm}">${b.generator}</span>`:''}</div><div class="headline">${esc(b.headline||'')}</div>${b.explainer?`<div class="explainer">${esc(b.explainer)}</div>`:''}</article>`;}).join('');document.getElementById('beats').innerHTML=html||'<div class="empty">No beats yet</div>';if(bs[0]&&bs[0].seq>lastBeatSeq)lastBeatSeq=bs[0].seq;setListen('ok','Live · '+new Date().toLocaleTimeString());}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function formatTime(iso){if(!iso)return '—';return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
async function refresh(){setListen('ok','Refreshing…');const f=await fetchFeed();if(f)render(f);}
function toggleUser(){currentUser=prompt('User ref:',currentUser)||currentUser;document.getElementById('userLabel').textContent=currentUser;lastBeatSeq=-1;refresh();}
refresh();setInterval(refresh,8000);
</script>
</body>
</html>
